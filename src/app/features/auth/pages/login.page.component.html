<div class="login-shell">
  <section class="login-card" role="form" aria-labelledby="login-title">
    <header class="card-header">
      <h1 id="login-title">Entrar</h1>
      <p class="subtitle">Acesse o Talent Core</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <!-- E-mail -->
      <div class="form-field">
        <label for="email">E-mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="username"
          placeholder="voce@empresa.com"
          [attr.aria-invalid]="email?.invalid && (email?.touched || email?.dirty)"
        />
        <small class="error" *ngIf="email?.hasError('required') && (email?.touched || email?.dirty)">
          Informe seu e-mail.
        </small>
        <small class="error" *ngIf="email?.hasError('email') && (email?.touched || email?.dirty)">
          E-mail inválido.
        </small>
      </div>

      <!-- Senha -->
      <div class="form-field">
        <label for="password">Senha</label>
        <div class="password-wrap">
          <input
            id="password"
            [type]="hide() ? 'password' : 'text'"
            formControlName="password"
            autocomplete="current-password"
            placeholder="••••••••"
          />
          <button
            type="button"
            class="icon-btn"
            (click)="toggleVisibility()"
            aria-label="Mostrar ou ocultar senha"
          >
            {{ hide() ? '👁️' : '🙈' }}
          </button>
        </div>
        <small class="error" *ngIf="password?.hasError('required') && (password?.touched || password?.dirty)">
          Informe sua senha.
        </small>
        <small class="error" *ngIf="password?.hasError('minlength') && (password?.touched || password?.dirty)">
          Mínimo de 6 caracteres.
        </small>
      </div>

      <!-- Opções -->
      <div class="row-between">
        <label class="check">
          <input type="checkbox" formControlName="remember" />
          <span>Lembrar-me</span>
        </label>

        <a routerLink="/recuperar-senha" class="muted">Esqueci a senha</a>
      </div>

      <!-- Botão -->
      <button class="primary" type="submit" [disabled]="form.invalid || loading()">
        <span *ngIf="!loading()">Entrar</span>
        <span *ngIf="loading()" class="spinner" aria-hidden="true"></span>
      </button>

      <!-- Erro de autenticação -->
      <p class="auth-error" *ngIf="authError()">{{ authError() }}</p>
    </form>

    <footer class="card-footer">
      <span class="muted">Novo por aqui?</span>
      <a routerLink="/cadastro">Criar conta</a>
    </footer>
  </section>
</div>
